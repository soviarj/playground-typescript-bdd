name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: lts/*

    - name: Cache node modules
      uses: actions/cache@v4
      with:
        path: ~/.npm
        key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Generate BDD tests
      run: npx playwright test --list

    - name: Run Playwright tests
      run: npx playwright test
      env:
        BANK_ADMIN_USER_NAME: ${{ secrets.BANK_ADMIN_USER_NAME }}
        BANK_ADMIN_USER_PASSWORD: ${{ secrets.BANK_ADMIN_USER_PASSWORD }}
        BANK_VIEWER_USER_NAME: ${{ secrets.BANK_VIEWER_USER_NAME }}
        BANK_VIEWER_USER_PASSWORD: ${{ secrets.BANK_VIEWER_USER_PASSWORD }}

    - name: Upload Playwright Report
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

    - name: Upload traces
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: traces
        path: test-results/