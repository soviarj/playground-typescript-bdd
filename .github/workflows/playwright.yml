name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
      inputs:
        tag:
          description: 'Tag to run (e.g. @smoke, @regress, TC-LOGIN-01)'
          required: false
          default: ''

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: lts/*

    - name: Cache node modules
      uses: actions/cache@v4
      with:
        path: ~/.npm
        key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Generate BDD tests
      run: npx playwright test --list

    - name: Run Playwright tests
      run: |
        if [ -z "${{ github.event.inputs.tag }}" ]; then
          npx playwright test --reporter=line,html
        else
          npx playwright test --grep "${{ github.event.inputs.tag }}" --reporter=line,html
        fi
      env:
        BANK_ADMIN_USER_NAME: ${{ secrets.BANK_ADMIN_USER_NAME }}
        BANK_ADMIN_USER_PASSWORD: ${{ secrets.BANK_ADMIN_USER_PASSWORD }}
        BANK_READONLY_USER_NAME: ${{ secrets.BANK_READONLY_USER_NAME }}
        BANK_READONLY_USER_PASSWORD: ${{ secrets.BANK_READONLY_USER_PASSWORD }}

    # HTML report (allways)
    - name: Upload Playwright Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

    # Trace + screenshots + video (only on failure)
    - name: Upload test results (traces, videos, screenshots)
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: test-results
        path: test-results/
        retention-days: 30